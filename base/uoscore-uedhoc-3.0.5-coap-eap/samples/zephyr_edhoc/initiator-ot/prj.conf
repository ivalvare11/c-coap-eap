CONFIG_NETWORKING=y
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_OPENTHREAD_SLAAC=y
CONFIG_OPENTHREAD_ENABLE_SERVICE=y
CONFIG_THREAD_STACK_INFO=y

CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y

CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# Logging
CONFIG_LOG=n
CONFIG_LOG_MAX_LEVEL=1
CONFIG_LOG_MODE_MINIMAL=y
CONFIG_BOOT_BANNER=y
#CONFIG_LOG_BACKEND_UART=y
#CONFIG_OPENTHREAD_DEBUG=y
# Logging
#CONFIG_NET_LOG=y
#CONFIG_NET_STATISTICS=y
#CONFIG_PRINTK=y

# Kernel options
#CONFIG_INIT_STACKS=y
#CONFIG_MAIN_STACK_SIZE=140000
#CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
#CONFIG_MBEDTLS_HEAP_SIZE=4096
#CONFIG_HEAP_MEM_POOL_SIZE=10000
CONFIG_INIT_STACKS=y
#CONFIG_MAIN_STACK_SIZE=24576
CONFIG_MAIN_STACK_SIZE=50576
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MBEDTLS_HEAP_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_NET_BUF_DATA_SIZE=512


# Network buffers
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=64
CONFIG_NET_BUF_TX_COUNT=64
CONFIG_NET_CONTEXT_NET_PKT_POOL=y
#CONFIG_NET_IPV6_MTU=1280
#CONFIG_NET_BUF_DATA_SIZE=256



# Add features required for FTD CLI
CONFIG_SHELL=y
CONFIG_OPENTHREAD_SHELL=y
CONFIG_OPENTHREAD_PING_SENDER=y

# Network config
CONFIG_OPENTHREAD_PANID=4660
CONFIG_OPENTHREAD_XPANID="11:11:11:11:22:22:22:22"
CONFIG_OPENTHREAD_NETWORKKEY="00:11:22:33:44:55:66:77:88:99:aa:bb:cc:dd:ee:ff"
CONFIG_OPENTHREAD_CHANNEL=15


# Generic networking options
CONFIG_NET_UDP=y
CONFIG_NET_TCP=n
CONFIG_NET_IPV6=y
CONFIG_NET_IPV4=n
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y
CONFIG_NET_CONNECTION_MANAGER=y

# Kernel options
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y


# IP address options
#CONFIG_NET_IF_UNICAST_IPV6_ADDR_COUNT=3
#CONFIG_NET_IF_MCAST_IPV6_ADDR_COUNT=4
CONFIG_NET_MAX_CONTEXTS=10

# Network shell
#CONFIG_NET_SHELL=y


# Network application options and configuration
CONFIG_NET_CONFIG_SETTINGS=y


CONFIG_NET_CONFIG_NEED_IPV6=y
CONFIG_NET_CONFIG_MY_IPV6_ADDR="fd11:22::100"
#CONFIG_NET_CONFIG_PEER_IPV6_ADDR="2001:db8::2"
#CONFIG_NET_CONFIG_NEED_IPV4=y
#CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.18.14"
#CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.168.178.37"

# Number of socket descriptors might need adjusting
# if there are more than 1 handlers defined.
CONFIG_ZVFS_OPEN_MAX=12

# How many client can connect to echo-server simultaneously
#CONFIG_NET_SAMPLE_NUM_HANDLERS=1

# For Socket offloading - https://docs.zephyrproject.org/latest/connectivity/networking/native_sim_setup.html#using-offloaded-sockets
CONFIG_ETH_NATIVE_POSIX=n
CONFIG_NET_DRIVERS=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS=y


#CONFIG_NET_IPV6_DAD=n

# CoAP
CONFIG_COAP=y
CONFIG_COAP_WELL_KNOWN_BLOCK_WISE=n

# OSCORE and EDHOC
CONFIG_UOSCORE=y
CONFIG_UEDHOC=y
#CONFIG_UOSCORE_DEBUG=y #enable debug messages from OSCORE
#CONFIG_UEDHOC_DEBUG=y #enable debug messages from EDHOC
CONFIG_ZCBOR=y
CONFIG_ZCBOR_CANONICAL=y


CONFIG_TEST_VECTOR=7

# USE MBEDTLS as crypto engine for OSCORE and EDHOC
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y

CONFIG_PSA_WANT_ALG_CCM=y
CONFIG_PSA_WANT_ALG_HMAC=y
CONFIG_PSA_WANT_ALG_ECDH=y
CONFIG_PSA_WANT_ALG_ECDSA=y

CONFIG_PSA_CRYPTO_ENABLE_ALL=y
CONFIG_PSA_WANT_KEY_TYPE_HMAC=y
CONFIG_PSA_WANT_KEY_TYPE_AES=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=y