version: '3'

services:
  h1:
    build: ./
    volumes: 
      - ./base:/home/uedhoc
    hostname: h1
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
    networks:
        common_net:
            ipv4_address: 192.168.56.101

  #h2:
